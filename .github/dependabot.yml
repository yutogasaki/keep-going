version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    reviewers:
      - yutogasaki
    labels:
      - dependencies
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch
    ignore:
      # vite-plugin-pwa@1.2.0 does not yet declare Vite 8 support.
      # Remove this once the PWA plugin peer dependency includes ^8.
      - dependency-name: vite
        versions:
          - ">=8"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 3
